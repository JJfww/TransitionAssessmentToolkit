<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    {{ $styles := resources.Get "css/site.css" | resources.Minify }}
    <link rel="stylesheet" href="{{ $styles.RelPermalink }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="{{ site.Home.RelPermalink }}">Transition Assessment Toolkit</a>
        <nav class="site-nav">
          <a href="{{ site.Home.RelPermalink }}">Home</a>
          <a href="{{ "about/" | relURL }}">About</a>
          <a href='{{ printf "%s#assessment-domains" site.Home.RelPermalink }}'>Assessments</a>
          <a href='{{ printf "%s#support-paths" site.Home.RelPermalink }}'>Support Paths</a>
          <a href='{{ printf "%s#additional-resources" site.Home.RelPermalink }}'>Resources</a>
        </nav>
      </header>
      <main>
        {{ block "main" . }}{{ end }}
      </main>
    </div>
  </body>
</html>
